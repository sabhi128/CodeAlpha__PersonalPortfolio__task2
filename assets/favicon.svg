<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    circle {
      stroke: #c5a880;
      transition: stroke 0.3s ease;
    }
    text {
      font-family: 'Cormorant Garamond', 'Georgia', serif;
      font-weight: 600;
      fill: #c5a880;
      font-size: 14px;
      letter-spacing: -0.05em;
      transition: fill 0.3s ease;
    }
    @media (prefers-color-scheme: light) {
      circle {
        stroke: #9b7d56;
      }
      text {
        fill: #9b7d56;
      }
    }
  </style>
  <circle cx="16" cy="16" r="14" fill="none" stroke-width="1.5" />
  <text x="15.5" y="21" text-anchor="middle">AS</text>
</svg>
